<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棍子英雄 - 手机访问</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .qr {
            margin: 20px auto;
            width: 250px;
            height: 250px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }
        .url {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            word-break: break-all;
        }
        .tips {
            text-align: left;
            background: #fff9e6;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .tips h3 { color: #f5a623; margin-bottom: 10px; }
        .tips ul { padding-left: 20px; }
        .tips li { margin: 5px 0; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            margin: 10px 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎮 棍子英雄</h1>
        <p class="subtitle">手机扫码即可游玩</p>
        
        <div class="qr" id="qr">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://10.206.132.190:8080" alt="QR Code" style="width: 200px; height: 200px;">
        </div>
        
        <div class="url">http://10.206.132.190:8080</div>
        
        <a href="http://10.206.132.190:8080" class="btn">直接访问</a>
        <a href="http://localhost:8080" class="btn">本地访问</a>
        
        <div class="tips">
            <h3>📱 访问说明</h3>
            <ul>
                <li>手机和电脑需在<strong>同一 WiFi</strong>网络</li>
                <li>用手机浏览器<strong>扫描二维码</strong></li>
                <li>或手动输入上方 URL 地址</li>
                <li>如无法访问，请检查防火墙设置</li>
            </ul>
        </div>
    </div>
    
    <script>
        // 自动检测最佳 IP
        fetch('http://10.206.132.190:8080')
            .then(() => {
                document.querySelectorAll('.url').forEach(el => el.innerText = 'http://10.206.132.190:8080');
                document.getElementById('qr').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://10.206.132.190:8080" style="width:200px;height:200px">';
            })
            .catch(() => {
                fetch('http://10.201.10.101:8080')
                    .then(() => {
                        document.querySelectorAll('.url').forEach(el => el.innerText = 'http://10.201.10.101:8080');
                        document.getElementById('qr').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://10.201.10.101:8080" style="width:200px;height:200px">';
                    })
                    .catch(() => {});
            });
    </script>
</body>
</html>
