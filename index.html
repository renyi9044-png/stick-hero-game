<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>棍子英雄 - Stick Hero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(180deg, #FFF5E4 0%, #FFE8D0 100%); 
            overflow: hidden; 
            touch-action: none; 
        }
        canvas { display: block; margin: 0 auto; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #score { 
            position: absolute; 
            top: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 48px; 
            font-weight: bold; 
            color: #1a1a1a; 
            text-shadow: none;
            font-family: 'Segoe UI', sans-serif;
        }
        #start, #gameover { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255,245,228,0.9); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            pointer-events: auto; 
        }
        #gameover { display: none; }
        #gameover.show { display: flex; }
        h1 { 
            color: #1a1a1a; 
            font-size: 42px; 
            margin-bottom: 20px; 
            text-shadow: none;
            font-family: 'Segoe UI', sans-serif;
        }
        p { 
            color: #333; 
            font-size: 16px; 
            margin-bottom: 30px; 
            text-align: center; 
            line-height: 2;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn { 
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); 
            color: #fff; 
            border: none; 
            padding: 15px 50px; 
            font-size: 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        #final { 
            font-size: 32px; 
            color: #1a1a1a; 
            margin-bottom: 10px;
            font-weight: bold;
        }
        #best { 
            font-size: 18px; 
            color: #666; 
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div id="score">0</div>
        <div id="start">
            <h1>🎯 棍子英雄</h1>
            <p>长按 → 棍子向上变长<br>松开 → 棍子向右倒下<br>搭桥走到对面</p>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>
        <div id="gameover">
            <h1>💀 掉下去了!</h1>
            <div id="final">得分：0</div>
            <div id="best">历史最佳：0</div>
            <button class="btn" id="restartBtn">再来</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // 固定逻辑尺寸 - 整体缩小到 75%
        const W = 450, H = 600;  // 原 600x800，缩小到 75%
        const PY = H - 60;
        const PLATFORM_HEIGHT = 300;  // 原 400，缩小到 75%
        
        canvas.width = W;
        canvas.height = H;
        
        let state = 'start';
        let score = 0;
        let best = localStorage.getItem('stickBest') || 0;
        
        // 所有平台和棍子都保留
        let platforms = [];
        let sticks = [];
        
        // 英雄
        let hero = { x: 0, y: 0 };
        
        // 当前棍子
        let stick = { x: 0, y: 0, len: 0, angle: -Math.PI/2 };
        
        // 相机
        let camX = 0;
        
        // 英雄当前站的平台索引
        let curIdx = 0;
        
        function init() {
            platforms = [
                { x: 60, y: PY - PLATFORM_HEIGHT, w: 60, h: PLATFORM_HEIGHT },
                { x: 225, y: PY - PLATFORM_HEIGHT, w: 60, h: PLATFORM_HEIGHT }
            ];
            sticks = [];
            curIdx = 0;
            hero = { x: 90, y: PY - PLATFORM_HEIGHT - 30 };  // 站在平台上
            stick = { x: 120, y: PY - PLATFORM_HEIGHT, len: 0, angle: -Math.PI/2 };
            camX = 22;  // 初始相机位置，让平台 1 在左侧
            score = 0;
            state = 'start';  // 重置状态
            document.getElementById('score').innerText = '0';
        }
        
        function spawn() {
            const last = platforms[platforms.length - 1];
            
            let minWidth, maxWidth;
            
            if (score < 10) {
                // 0-9 分：简单模式（缩小到 75%）
                minWidth = 68;   // 原 90
                maxWidth = 113;  // 原 150
            } else if (score < 20) {
                // 10-19 分：中等难度（缩小到 75%）
                minWidth = 38;   // 原 50
                maxWidth = 90;   // 原 120
            } else {
                // 20+ 分：困难模式（缩小到 75%）
                minWidth = 15;   // 原 20
                maxWidth = 60;   // 原 80
            }
            
            const width = minWidth + Math.random() * (maxWidth - minWidth);
            
            // 平台距离随机：45-263 像素（原 60-350，缩小到 75%）
            const minGap = 45;
            const maxGap = 263;
            const gap = minGap + Math.random() * (maxGap - minGap);
            
            platforms.push({
                x: last.x + last.w + gap,
                y: PY - PLATFORM_HEIGHT,  // 高柱子顶部
                w: width,
                h: PLATFORM_HEIGHT  // 400px 高柱子
            });
        }
        
        function update() {
            if (state === 'grow') {
                stick.len += 3;
            }
            
            if (state === 'rotate') {
                stick.angle += 0.05;
                
                const tipX = stick.x + stick.len * Math.cos(stick.angle);
                const tipY = stick.y + stick.len * Math.sin(stick.angle);
                const target = platforms[curIdx + 1];
                
                // 棍子水平后检查是否搭到目标平台
                if (stick.angle >= 0) {
                    stick.angle = 0;
                    const tipX = stick.x + stick.len;
                    
                    // 严格检查：棍子必须搭在目标平台上
                    const onPlatform = tipX >= target.x && tipX <= target.x + target.w;
                    
                    if (onPlatform) {
                        state = 'walk';
                    } else {
                        // 棍子太短或太长 → 先走路，走到尽头再掉
                        state = 'walk_fall';
                    }
                }
            }
            
            if (state === 'walk') {
                hero.x += 3;  // 恢复原速度
                const targetPlat = platforms[curIdx + 1];
                const targetX = targetPlat.x + targetPlat.w;  // 走到新平台的右边缘
                
                if (hero.x >= targetX - 19) {  // 25 * 0.75 ≈ 19
                    hero.x = targetX - 19;
                    curIdx++;
                    hero.y = platforms[curIdx].y - 50;
                    state = 'next';
                    
                    setTimeout(() => {
                        score++;
                        document.getElementById('score').innerText = score;
                        sticks.push({ ...stick });
                        spawn();
                        
                        // 棍子从英雄当前站的平台右边缘伸出
                        const plat = platforms[curIdx];
                        stick.x = plat.x + plat.w;
                        stick.y = plat.y;
                        stick.len = 0;
                        stick.angle = -Math.PI/2;
                        
                        state = 'start';
                    }, 400);  // 恢复原等待时间
                }
            }
            
            // 棍子太短/太长：英雄走到棍子尽头再掉下来
            if (state === 'walk_fall') {
                hero.x += 3;  // 恢复原速度
                const end = stick.x + stick.len;
                
                // 走到棍子尽头
                if (hero.x >= end - 19) {  // 25 * 0.75 ≈ 19
                    hero.x = end - 19;
                    state = 'fall';  // 开始掉落
                }
            }
            
            if (state === 'fall') {
                hero.y += 12;
                // 掉到平台底部以下就游戏结束（悬崖感）
                if (hero.y > PY + 50) {
                    state = 'gameover';
                    if (score > best) {
                        best = score;
                        localStorage.setItem('stickBest', best);
                    }
                    document.getElementById('final').innerText = '得分：' + score;
                    document.getElementById('best').innerText = '历史最佳：' + best;
                    document.getElementById('gameover').classList.add('show');
                }
            }
            
            // 游戏结束后，保持相机位置不变
            if (state !== 'gameover') {
                // 相机逻辑 - 简单直接：
                // 英雄在哪个平台，相机就让那个平台在屏幕左侧
                const currentPlat = platforms[curIdx];
                const targetCamX = currentPlat.x - 50;
                
                // 匀速移动到目标位置
                const diff = targetCamX - camX;
                if (Math.abs(diff) > 1) {
                    camX += diff * 0.08;  // 8% 的速度，平滑但不过分
                } else {
                    camX = targetCamX;
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.save();
            ctx.translate(-camX, 0);
            
            // 平台 - 黑色高柱子（悬崖感）
            platforms.forEach(p => {
                if (p.x + p.w < camX - 50 || p.x > camX + W + 50) return;
                ctx.fillStyle = '#1a1a1a';  // 深黑色
                ctx.fillRect(p.x, p.y, p.w, p.h);
                // 顶部亮边
                ctx.fillStyle = '#333';
                ctx.fillRect(p.x, p.y, p.w, 4);
                // 侧面阴影
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(p.x + p.w - 8, p.y, 8, p.h);
            });
            
            // 棍子 - 黑色（缩小到 75%）
            [...sticks, stick].forEach(s => {
                if (s.len < 5) return;
                if (s.x + s.len < camX - 50 || s.x > camX + W + 50) return;
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.angle);
                ctx.fillStyle = '#000';  // 纯黑色
                ctx.fillRect(0, -2, s.len, 4);  // 原 6px 高，现在 4px
                ctx.restore();
            });
            
            // 英雄 - 黑色火柴人（缩小到 75%）
            ctx.strokeStyle = '#000';  // 纯黑色
            ctx.lineWidth = 2;  // 原 3
            ctx.beginPath();
            ctx.arc(hero.x, hero.y - 15, 11, 0, Math.PI * 2);  // 头部 14→11
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(hero.x, hero.y - 4);
            ctx.lineTo(hero.x, hero.y + 14);  // 身体缩短
            ctx.lineTo(hero.x - 8, hero.y + 26);  // 腿缩短
            ctx.moveTo(hero.x, hero.y + 14);
            ctx.lineTo(hero.x + 8, hero.y + 26);
            ctx.moveTo(hero.x, hero.y);
            ctx.lineTo(hero.x - 9, hero.y + 9);  // 手臂缩短
            ctx.moveTo(hero.x, hero.y);
            ctx.lineTo(hero.x + 9, hero.y + 9);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        function start() {
            console.log('Starting new game...');
            init();
            document.getElementById('start').style.display = 'none';
            document.getElementById('gameover').classList.remove('show');
            console.log('Game state:', state, 'score:', score, 'curIdx:', curIdx);
        }
        
        document.getElementById('restartBtn').onclick = () => {
            console.log('Restart clicked!');
            start();
        };
        
        canvas.onmousedown = () => { if (state === 'start') state = 'grow'; };
        canvas.onmouseup = () => { if (state === 'grow') state = 'rotate'; };
        canvas.ontouchstart = e => { e.preventDefault(); if (state === 'start') state = 'grow'; };
        canvas.ontouchend = e => { e.preventDefault(); if (state === 'grow') state = 'rotate'; };
        
        document.getElementById('startBtn').onclick = start;
        
        init();
        loop();
    </script>
</body>
</html>
