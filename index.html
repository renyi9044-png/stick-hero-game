<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>棍子英雄 - Stick Hero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(180deg, #FFF5E4 0%, #FFE8D0 100%); 
            overflow: hidden; 
            touch-action: none;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #score { 
            position: absolute; 
            top: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 48px; 
            font-weight: bold; 
            color: #1a1a1a; 
            text-shadow: none;
            font-family: 'Segoe UI', sans-serif;
        }
        #start, #gameover { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255,245,228,0.9); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            pointer-events: auto; 
        }
        #gameover { display: none; }
        #gameover.show { display: flex; }
        h1 { 
            color: #1a1a1a; 
            font-size: 42px; 
            margin-bottom: 20px; 
            text-shadow: none;
            font-family: 'Segoe UI', sans-serif;
        }
        p { 
            color: #333; 
            font-size: 16px; 
            margin-bottom: 30px; 
            text-align: center; 
            line-height: 2;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn { 
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); 
            color: #fff; 
            border: none; 
            padding: 15px 50px; 
            font-size: 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        #final { 
            font-size: 32px; 
            color: #1a1a1a; 
            margin-bottom: 10px;
            font-weight: bold;
        }
        #best { 
            font-size: 18px; 
            color: #666; 
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div id="score">0</div>
        <div id="start">
            <h1>🎯 棍子英雄</h1>
            <p>长按 → 棍子向上变长<br>松开 → 棍子向右倒下<br>搭桥走到对面</p>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>
        <div id="gameover">
            <h1>💀 掉下去了!</h1>
            <div id="final">得分：0</div>
            <div id="best">历史最佳：0</div>
            <button class="btn" id="restartBtn">再来</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // 固定逻辑尺寸 - 整体缩小到 60%
        const LOGIC_W = 360, LOGIC_H = 480;  // 游戏逻辑尺寸
        const PY = LOGIC_H - 48;
        const PLATFORM_HEIGHT = 240;  // 平台高度
        
        // 设置 Canvas 实际像素
        canvas.width = LOGIC_W;
        canvas.height = LOGIC_H;
        
        // 适配屏幕：让 Canvas 填满屏幕
        function resizeCanvas() {
            const scaleX = window.innerWidth / LOGIC_W;
            const scaleY = window.innerHeight / LOGIC_H;
            const scale = Math.min(scaleX, scaleY);
            
            canvas.style.width = (LOGIC_W * scale) + 'px';
            canvas.style.height = (LOGIC_H * scale) + 'px';
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();  // 初始化
        
        let state = 'start';
        let score = 0;
        let best = localStorage.getItem('stickBest') || 0;
        
        // 所有平台和棍子都保留
        let platforms = [];
        let sticks = [];
        
        // 英雄
        let hero = { x: 0, y: 0 };
        
        // 当前棍子
        let stick = { x: 0, y: 0, len: 0, angle: -Math.PI/2 };
        
        // 相机
        let camX = 0;
        
        // 英雄当前站的平台索引
        let curIdx = 0;
        
        function init() {
            platforms = [
                { x: 48, y: PY - PLATFORM_HEIGHT, w: 48, h: PLATFORM_HEIGHT },
                { x: 180, y: PY - PLATFORM_HEIGHT, w: 48, h: PLATFORM_HEIGHT }
            ];
            sticks = [];
            curIdx = 0;
            hero = { x: 72, y: PY - PLATFORM_HEIGHT - 21 };  // 英雄站在平台顶部
            stick = { x: 96, y: PY - PLATFORM_HEIGHT, len: 0, angle: -Math.PI/2 };
            camX = 18;  // 初始相机位置
            score = 0;
            state = 'start';
            document.getElementById('score').innerText = '0';
        }
        
        function spawn() {
            const last = platforms[platforms.length - 1];
            
            let minWidth, maxWidth;
            
            if (score < 10) {
                // 0-9 分：简单模式
                minWidth = 8;
                maxWidth = 42;
            } else if (score < 20) {
                // 10-19 分：中等难度
                minWidth = 8;
                maxWidth = 42;
            } else {
                // 20+ 分：困难模式
                minWidth = 8;
                maxWidth = 42;
            }
            
            const width = minWidth + Math.random() * (maxWidth - minWidth);
            
            // 平台距离随机：3-108 像素（原 5-180，缩小到 60%）
            const minGap = 3;
            const maxGap = 108;
            const gap = minGap + Math.random() * (maxGap - minGap);
            
            platforms.push({
                x: last.x + last.w + gap,
                y: PY - PLATFORM_HEIGHT,  // 高柱子顶部
                w: width,
                h: PLATFORM_HEIGHT  // 400px 高柱子
            });
        }
        
        function update() {
            if (state === 'grow') {
                stick.len += 3;
            }
            
            if (state === 'rotate') {
                stick.angle += 0.05;
                
                const tipX = stick.x + stick.len * Math.cos(stick.angle);
                const tipY = stick.y + stick.len * Math.sin(stick.angle);
                const target = platforms[curIdx + 1];
                
                // 棍子水平后检查是否搭到目标平台
                if (stick.angle >= 0) {
                    stick.angle = 0;
                    const tipX = stick.x + stick.len;
                    
                    // 严格检查：棍子必须搭在目标平台上
                    const onPlatform = tipX >= target.x && tipX <= target.x + target.w;
                    
                    if (onPlatform) {
                        state = 'walk';
                    } else {
                        // 棍子太短或太长 → 先走路，走到尽头再掉
                        state = 'walk_fall';
                    }
                }
            }
            
            if (state === 'walk') {
                hero.x += 4;  // 走路速度
                const targetPlat = platforms[curIdx + 1];
                const targetX = targetPlat.x + targetPlat.w;  // 走到新平台的右边缘
                
                if (hero.x >= targetX - 15) {
                    hero.x = targetX - 15;
                    curIdx++;
                    // 英雄站在平台顶部（英雄脚部 = 平台顶部）
                    hero.y = platforms[curIdx].y - 21;  // 21 是英雄腿底部到中心的距离
                    state = 'next';
                    
                    setTimeout(() => {
                        score++;
                        document.getElementById('score').innerText = score;
                        sticks.push({ ...stick });
                        spawn();
                        
                        // 棍子从英雄当前站的平台右边缘伸出
                        const plat = platforms[curIdx];
                        stick.x = plat.x + plat.w;
                        stick.y = plat.y;
                        stick.len = 0;
                        stick.angle = -Math.PI/2;
                        
                        state = 'start';
                    }, 300);
                }
            }
            
            // 棍子太短/太长：英雄走到棍子尽头再掉下来
            if (state === 'walk_fall') {
                hero.x += 4;  // 走路速度
                const end = stick.x + stick.len;
                
                // 走到棍子尽头
                if (hero.x >= end - 15) {
                    hero.x = end - 15;
                    state = 'fall';  // 开始掉落
                }
            }
            
            if (state === 'fall') {
                hero.y += 12;
                // 掉到平台底部以下就游戏结束（悬崖感）
                if (hero.y > PY + 50) {
                    state = 'gameover';
                    if (score > best) {
                        best = score;
                        localStorage.setItem('stickBest', best);
                    }
                    document.getElementById('final').innerText = '得分：' + score;
                    document.getElementById('best').innerText = '历史最佳：' + best;
                    document.getElementById('gameover').classList.add('show');
                }
            }
            
            // 游戏结束后，保持相机位置不变
            if (state !== 'gameover') {
                // 相机始终跟随英雄，平滑移动
                const targetCamX = hero.x - LOGIC_W * 0.3;
                const diff = targetCamX - camX;
                if (Math.abs(diff) > 1) {
                    camX += diff * 0.08;  // 慢速平滑跟随，无顿挫感
                } else {
                    camX = targetCamX;
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
            ctx.save();
            ctx.translate(-camX, 0);
            
            // 平台 - 黑色高柱子（悬崖感）
            platforms.forEach(p => {
                if (p.x + p.w < camX - 50 || p.x > camX + LOGIC_W + 50) return;
                ctx.fillStyle = '#1a1a1a';  // 深黑色
                ctx.fillRect(p.x, p.y, p.w, p.h);
                // 顶部亮边
                ctx.fillStyle = '#333';
                ctx.fillRect(p.x, p.y, p.w, 4);
                // 侧面阴影
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(p.x + p.w - 8, p.y, 8, p.h);
            });
            
            // 棍子 - 黑色（缩小到 60%）
            [...sticks, stick].forEach(s => {
                if (s.len < 5) return;
                if (s.x + s.len < camX - 50 || s.x > camX + LOGIC_W + 50) return;
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.angle);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, -2, s.len, 3);  // 3px 高
                ctx.restore();
            });
            
            // 英雄 - 黑色火柴人（缩小到 60%）
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(hero.x, hero.y - 9, 7, 0, Math.PI * 2);  // 头部
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(hero.x, hero.y - 3);
            ctx.lineTo(hero.x, hero.y + 11);  // 身体
            ctx.lineTo(hero.x - 6, hero.y + 21);  // 左腿
            ctx.moveTo(hero.x, hero.y + 11);
            ctx.lineTo(hero.x + 6, hero.y + 21);  // 右腿
            ctx.moveTo(hero.x, hero.y);
            ctx.lineTo(hero.x - 7, hero.y + 7);  // 左臂
            ctx.moveTo(hero.x, hero.y);
            ctx.lineTo(hero.x + 7, hero.y + 7);  // 右臂
            ctx.stroke();
            
            ctx.restore();
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        function start() {
            console.log('Starting new game...');
            init();
            document.getElementById('start').style.display = 'none';
            document.getElementById('gameover').style.display = 'none';
            console.log('Game state:', state, 'score:', score, 'curIdx:', curIdx);
        }
        
        document.getElementById('restartBtn').onclick = () => {
            console.log('Restart clicked!');
            start();
        };
        
        canvas.onmousedown = () => { if (state === 'start') state = 'grow'; };
        canvas.onmouseup = () => { if (state === 'grow') state = 'rotate'; };
        canvas.ontouchstart = e => { e.preventDefault(); if (state === 'start') state = 'grow'; };
        canvas.ontouchend = e => { e.preventDefault(); if (state === 'grow') state = 'rotate'; };
        
        document.getElementById('startBtn').onclick = start;
        
        init();
        loop();
    </script>
</body>
</html>
